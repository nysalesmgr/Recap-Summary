<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recap Summary Generator — Student Accommodation</title>
<style>
  :root {
    --bg: #303c6c;
    --surface: #FFFFFF;
    --surface2: #EEECEA;
    --border: #D8D4CE;
    --border-strong: #B0AAA2;
    --text: #303c6c;
    --text-secondary: #5a6490;
    --text-hint: #9099be;
    --accent: #303c6c;
    --accent-light: #e8eaf3;
    --accent-text: #303c6c;
    --opt1: #303c6c;
    --opt1-light: #e8eaf3;
    --opt2: #d4706b;
    --opt2-light: #fdf0ef;
    --opt3: #7aab96;
    --opt3-light: #eaf4f0;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 100px; position: sticky; top: 0; z-index: 10; }
  .logo img { height: 80px; display: block; }
  .header-tag { font-size: 11px; font-weight: 500; background: #ffd881; color: #303c6c; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.02em; text-transform: uppercase; }

  .page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; display: grid; grid-template-columns: 360px 1fr; gap: 1.5rem; align-items: start; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .panel-head { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .panel-head h2 { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-secondary); }
  .panel-icon { width: 28px; height: 28px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .pi-green { background: #e8eaf3; color: #303c6c; }
  .panel-body { padding: 1.25rem; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  label { font-size: 12px; font-weight: 500; color: var(--text-secondary); display: block; margin-bottom: 5px; letter-spacing: 0.01em; }
  input[type="date"], input[type="number"] { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 13px; background: #ffffff; color: var(--text); font-family: inherit; transition: border-color 0.15s; outline: none; }
  input:focus { border-color: #303c6c; background: var(--surface); }
  input[readonly] { background: var(--surface2); color: var(--text-secondary); cursor: default; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

  /* Base rate row */
  .base-rate-row { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 14px; }

  /* Tier display */
  .tier-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .tier-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; background: #ffffff; }
  .tier-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .t1 .tier-label { color: #303c6c; }
  .t2 .tier-label { color: #d4706b; }
  .t3 .tier-label { color: #7aab96; }
  .tier-card input { background: var(--surface2); }

  .fees-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  .btn-generate { width: 100%; padding: 11px; background: #303c6c; color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: -0.01em; margin-top: 4px; transition: background 0.15s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
  .btn-generate:hover { background: #ffd881; color: #303c6c; }
  .btn-generate:active { transform: scale(0.99); }

  .error-msg { font-size: 12px; color: #b03030; background: #fdf2f2; border: 1px solid #f0c0c0; border-radius: var(--radius-sm); padding: 8px 12px; margin-top: 10px; display: none; }

  .right-col { display: flex; flex-direction: column; gap: 1rem; }

  /* Summary cards */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .sum-card { border-radius: var(--radius-sm); padding: 12px 14px; border: 1px solid var(--border); background: var(--surface); }
  .sum-card-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .sum-card-val { font-size: 17px; font-weight: 700; letter-spacing: -0.03em; }
  .sum-card-sub { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
  .c1 .sum-card-label { color: #303c6c; } .c1 .sum-card-val { color: #303c6c; }
  .c2 .sum-card-label { color: #d4706b; } .c2 .sum-card-val { color: #d4706b; }
  .c3 .sum-card-label { color: #7aab96; } .c3 .sum-card-val { color: #7aab96; }

  /* Option selector — big buttons */
  .option-select-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-secondary); padding: 1rem 1.25rem 0.6rem; }
  .option-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 1.25rem 1rem; }
  .opt-btn { border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 10px; cursor: pointer; background: #ffffff; font-family: inherit; text-align: center; transition: all 0.15s; }
  .opt-btn:hover { background: var(--surface2); }
  .opt-btn-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .opt-btn-name { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  .opt-btn.sel-1 { background: #303c6c; border-color: #303c6c; }
  .opt-btn.sel-1 .opt-btn-label { color: #ffffff; }
  .opt-btn.sel-1 .opt-btn-name { color: #e8eaf3; }
  .opt-btn.sel-2 { background: #d4706b; border-color: #d4706b; }
  .opt-btn.sel-2 .opt-btn-label { color: #ffffff; }
  .opt-btn.sel-2 .opt-btn-name { color: #fdf0ef; }
  .opt-btn.sel-3 { background: #7aab96; border-color: #7aab96; }
  .opt-btn.sel-3 .opt-btn-label { color: #ffffff; }
  .opt-btn.sel-3 .opt-btn-name { color: #eaf4f0; }

  /* Output */
  .output-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.25rem; background: var(--bg); border-bottom: 1px solid var(--border); border-top: 1px solid var(--border); }
  .output-meta { font-size: 12px; color: var(--text-hint); }
  .output-meta strong { color: var(--text-secondary); }
  .btn-copy { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn-copy:hover { background: var(--bg); border-color: var(--border-strong); color: var(--text); }
  .btn-copy.copied { background: #e8eaf3; border-color: #303c6c; color: #303c6c; }
  .output-text { padding: 1.25rem; font-family: 'SFMono-Regular', 'Consolas', monospace; font-size: 12.5px; line-height: 1.85; color: var(--text); white-space: pre-wrap; word-break: break-word; min-height: 300px; max-height: 600px; overflow-y: auto; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; text-align: center; color: var(--text-hint); }
  .empty-icon { font-size: 36px; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-size: 13px; }

  @media (max-width: 860px) { .page { grid-template-columns: 1fr; } .summary-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 560px) { header { padding: 0 1rem; } .page { padding: 1rem; } .tier-grid, .fees-row, .option-btns { grid-template-columns: 1fr; } .summary-grid { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
</style>
</head>

<script>
let outputs = { 1: '', 2: '', 3: '' };
let generated = false;
let selectedOption = 0;

function autoRates() {
  const base = parseFloat(document.getElementById('rate3').value) || 0;
  document.getElementById('rate1').value = base + 500;
  document.getElementById('rate2').value = base + 200;
  document.getElementById('rate3display').value = base;
  document.getElementById('deposit').value = base;
}
autoRates();

function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

function fmtDate(y, m, d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return String(d).padStart(2,'0') + ' ' + months[m-1] + ' ' + y;
}

function money(n) {
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function buildBreakdown(moveIn, moveOut, rate) {
  const lines = [];
  let total = 0;
  let d = new Date(moveIn);
  const end = new Date(moveOut);
  while (d < end) {
    const y = d.getFullYear(), m = d.getMonth() + 1;
    const dim = daysInMonth(y, m);
    const startDay = d.getDate();
    const lastOfMonth = new Date(y, m - 1, dim);
    // segEnd is the last day we charge in this month
    const segEnd = end <= lastOfMonth ? end : lastOfMonth;
    const endDay = segEnd.getDate();
    const days = endDay - startDay + 1;
    // daily rate = monthly rate / days in that month, rounded to 2dp per day
    const dailyRate = Math.round((rate / dim) * 100) / 100;
    const amount = days === dim ? rate : Math.round(dailyRate * days * 100) / 100;
    lines.push({ label: fmtDate(y, m, startDay) + ' – ' + fmtDate(y, m, endDay), amount });
    total += amount;
    d = new Date(y, m - 1, dim + 1);
  }
  return { lines, total: Math.round(total * 100) / 100 };
}



function optionSummaryBlock(r1, r2, r3, chosenOpt) {
  const mark = (n) => n === chosenOpt ? ' ✔ (selected)' : '';
  const bold = (n, text) => n === chosenOpt ? `*** ${text} ***` : text;
  return `${bold(1, `OPTION 1${mark(1)}`)}
• ${money(r1)} per month inclusive of utilities
• Payment made monthly, subject to background check, credit check and/or 3rd party guarantor

${bold(2, `OPTION 2${mark(2)}`)}
• ${money(r2)} per month inclusive of utilities
• Payments split into 2 instalments, no guarantor required

${bold(3, `OPTION 3${mark(3)}`)}
• ${money(r3)} per month inclusive of utilities
• Full rental paid upfront upon signing, no guarantor required`;
}

function buildFull(moveIn, moveOut, r1, r2, r3, bankFee, dep, clean, chosenOpt) {
  const summary = optionSummaryBlock(r1, r2, r3, chosenOpt);

  let breakdownSection = '';

  if (chosenOpt === 1) {
    const { lines } = buildBreakdown(moveIn, moveOut, r1);

    // Signing items: prorated partial month (if move-in not 1st) + first full month
    const signingLines = [];

    // Check if first line is a partial month
    const firstLine = lines[0];
    const moveInDay = moveIn.getDate();
    const firstMonthDim = daysInMonth(moveIn.getFullYear(), moveIn.getMonth() + 1);

    if (moveInDay !== 1) {
      // Partial first month
      signingLines.push(firstLine);
      // Then first full month (next month)
      if (lines[1]) signingLines.push(lines[1]);
    } else {
      // Move-in is the 1st — just the first full month
      signingLines.push(firstLine);
    }

    const signingSubtotal = Math.round(signingLines.reduce((a, l) => a + l.amount, 0) * 100) / 100;
    const totalDue = Math.round((signingSubtotal + bankFee + dep) * 100) / 100;
    const lineStr = signingLines.map(l => '• ' + l.label + ' : ' + money(l.amount)).join('\n');

    breakdownSection = `
─────────────────────────────────────────
OPTION 1 — Pricing breakdown

Under this rate of ${money(r1)} per month, you'll have to pay the prorated rental of 1-month rent + security deposit upon signing. Subsequently, rent payment will be automatically deducted from one authorised bank account on the 1st of each month. However, if the 1st of the month falls on a weekend or bank holiday, the deduction will occur on the last business day prior to that date.

${lineStr}
• Bank fee: ${money(bankFee)}
• Security deposit: ${money(dep)} (Assuming that there are no missing items and/or damages in the apartment, we will refund the deposit at the end of your stay, after deducting a mandatory exit cleaning fee of ${money(clean)})

Total Amount Due: ${money(totalDue)} (Due upon signing the Licence Agreement)`;
  }

  if (chosenOpt === 2) {
    const { lines, total } = buildBreakdown(moveIn, moveOut, r2);

    // Split: instalment 1 = all months up to and including January
    // instalment 2 = February onwards
    // January is identified by month name containing 'Jan'
    let splitIdx = lines.length; // default: all in instalment 1
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].label.includes('Feb')) { splitIdx = i; break; }
    }
    // If no February found, split at midpoint as fallback
    if (splitIdx === lines.length && lines.length > 1) splitIdx = Math.ceil(lines.length / 2);

    const half1 = lines.slice(0, splitIdx);
    const half2 = lines.slice(splitIdx);
    const sum1 = Math.round(half1.reduce((a, l) => a + l.amount, 0) * 100) / 100;
    const sum2 = Math.round(half2.reduce((a, l) => a + l.amount, 0) * 100) / 100;
    const due1 = Math.round((sum1 + bankFee) * 100) / 100;
    const due2 = Math.round((sum2 + bankFee + dep) * 100) / 100;

    // 2nd instalment due date: 1 Jan of the year after data entry
    const nextYear = new Date().getFullYear() + 1;
    const due2Date = `01 Jan ${nextYear}`;

    breakdownSection = `
─────────────────────────────────────────
OPTION 2 — Pricing breakdown

Under this discounted rate of ${money(r2)} per month, we will require the first half of your stay's rental payment to be paid upfront when signing the licence agreement.

First instalment (due upon signing):
${half1.map(l => '• ' + l.label + ' : ' + money(l.amount)).join('\n')}
• Bank fee: ${money(bankFee)}
Total Amount Due (1st instalment): ${money(due1)}

Second instalment (due ${due2Date}):
${half2.map(l => '• ' + l.label + ' : ' + money(l.amount)).join('\n')}
• Bank fee: ${money(bankFee)}
• Security deposit: ${money(dep)} (Assuming that there are no missing items and/or damages in the apartment, we will refund the deposit at the end of your stay, after deducting a mandatory exit cleaning fee of ${money(clean)})
Total Amount Due (2nd instalment): ${money(due2)}`;
  }

  if (chosenOpt === 3) {
    const { lines, total } = buildBreakdown(moveIn, moveOut, r3);
    const totalDue = Math.round((total + bankFee + dep) * 100) / 100;
    const lineStr = lines.map(l => '• ' + l.label + ' : ' + money(l.amount)).join('\n');
    breakdownSection = `
─────────────────────────────────────────
OPTION 3 — Pricing breakdown

Under this rate of ${money(r3)} per month, we will require the full rental payment in addition to the security deposit (equivalent to 1 month's rental) to be paid upfront when signing the licence agreement.

${lineStr}
• Bank fee: ${money(bankFee)}
• Security deposit: ${money(dep)} (Assuming that there are no missing items and/or damages in the apartment, we will refund the deposit at the end of your stay, after deducting a mandatory exit cleaning fee of ${money(clean)})

Total Amount Due: ${money(totalDue)} (Due upon signing the Licence Agreement)`;
  }

  return `${summary}
${breakdownSection}`;
}

function showError(msg) { const e = document.getElementById('errorMsg'); e.textContent = msg; e.style.display = 'block'; }
function clearError() { document.getElementById('errorMsg').style.display = 'none'; }

function generate() {
  clearError();
  const moveInVal = document.getElementById('moveIn').value;
  const moveOutVal = document.getElementById('moveOut').value;
  if (!moveInVal || !moveOutVal) { showError('Please enter both move-in and move-out dates.'); return; }
  const moveIn = new Date(moveInVal + 'T00:00:00');
  const moveOut = new Date(moveOutVal + 'T00:00:00');
  if (moveOut <= moveIn) { showError('Move-out date must be after move-in date.'); return; }

  const r3 = parseFloat(document.getElementById('rate3').value) || 2900;
  const r2 = r3 + 200;
  const r1 = r3 + 500;
  const clean = parseFloat(document.getElementById('cleaning').value) || 225;
  const bankFee = parseFloat(document.getElementById('bankFee').value) || 15;
  // Deposit = chosen option's monthly rate
  const dep1 = r1, dep2 = r2, dep3 = r3;

  outputs[1] = buildFull(moveIn, moveOut, r1, r2, r3, bankFee, dep1, clean, 1);
  outputs[2] = buildFull(moveIn, moveOut, r1, r2, r3, bankFee, dep2, clean, 2);
  outputs[3] = buildFull(moveIn, moveOut, r1, r2, r3, bankFee, dep3, clean, 3);

  // Summary card totals
  const t1 = Math.round((buildBreakdown(moveIn, moveOut, r1).total + bankFee + dep1) * 100) / 100;
  const t3 = Math.round((buildBreakdown(moveIn, moveOut, r3).total + bankFee + dep3) * 100) / 100;
  const bd2 = buildBreakdown(moveIn, moveOut, r2);
  const half1sum = Math.round(bd2.lines.slice(0, Math.ceil(bd2.lines.length/2)).reduce((a,l)=>a+l.amount,0)*100)/100;
  const t2first = Math.round((half1sum + bankFee) * 100) / 100;

  document.getElementById('summaryCards').innerHTML = `
    <div class="sum-card c1">
      <div class="sum-card-label">Option 1 — Total</div>
      <div class="sum-card-val">${money(t1)}</div>
      <div class="sum-card-sub">Monthly • ${money(r1)}/mo</div>
    </div>
    <div class="sum-card c2">
      <div class="sum-card-label">Option 2 — 1st instalment</div>
      <div class="sum-card-val">${money(t2first)}</div>
      <div class="sum-card-sub">2 instalments • ${money(r2)}/mo</div>
    </div>
    <div class="sum-card c3">
      <div class="sum-card-label">Option 3 — Total</div>
      <div class="sum-card-val">${money(t3)}</div>
      <div class="sum-card-sub">Full upfront • ${money(r3)}/mo</div>
    </div>`;

  document.getElementById('summaryPanel').style.display = 'block';
  generated = true;

  // Reset option buttons
  [1,2,3].forEach(i => {
    document.getElementById('obtn'+i).className = 'opt-btn';
  });
  selectedOption = 0;
  document.getElementById('outputMeta').innerHTML = 'Now select the student\'s preferred option above';
  document.getElementById('outputArea').innerHTML = `<div class="empty-state"><div class="empty-icon">👆</div><p>Select the student's preferred option<br>to generate the final recap text.</p></div>`;
  document.getElementById('copyBtn').className = 'btn-copy';
  document.getElementById('copyBtn').innerHTML = '⎘ Copy text';
}

function pickOption(n) {
  if (!generated) { showError('Please generate a summary first.'); return; }
  selectedOption = n;
  [1,2,3].forEach(i => {
    document.getElementById('obtn'+i).className = 'opt-btn' + (i === n ? ' sel-'+i : '');
  });

  const r3 = parseFloat(document.getElementById('rate3').value) || 2900;
  const rates = { 1: r3 + 500, 2: r3 + 200, 3: r3 };
  document.getElementById('deposit').value = rates[n];

  const labels = { 1: 'Option 1 — Monthly debit', 2: 'Option 2 — 2 instalments', 3: 'Option 3 — Full upfront' };
  document.getElementById('outputMeta').innerHTML = `<strong>${labels[n]}</strong> selected`;

  // Render with bold for *** lines in preview
  const rendered = escHtml(outputs[n]).replace(/\*\*\* (.*?) \*\*\*/g, '<strong>$1</strong>');
  document.getElementById('outputArea').innerHTML = `<div class="output-text">${rendered}</div>`;
  document.getElementById('copyBtn').className = 'btn-copy';
  document.getElementById('copyBtn').innerHTML = '⎘ Copy text';
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyText() {
  if (!selectedOption || !generated) return;
  const text = outputs[selectedOption];
  const btn = document.getElementById('copyBtn');

  const markCopied = () => {
    btn.className = 'btn-copy copied';
    btn.innerHTML = '✓ Copied!';
    setTimeout(() => { btn.className = 'btn-copy'; btn.innerHTML = '⎘ Copy text'; }, 2000);
  };

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(markCopied).catch(() => fallbackCopy(text, markCopied));
  } else {
    fallbackCopy(text, markCopied);
  }
}

function fallbackCopy(text, onSuccess) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    onSuccess();
  } catch(e) {
    alert('Copy failed. Please select all text in the box and copy manually (Ctrl+A / Cmd+A, then Ctrl+C / Cmd+C).');
  }
  document.body.removeChild(ta);
}
</script>
